<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="18" height="16" viewBox="0 0 18 16" fill="none" role="img" aria-label="geojson icon">
  <!-- Curly braces representing JSON -->
  <text x="1" y="12" font-family="monospace" font-size="11" font-weight="bold" fill="white">{</text>
  <text x="12" y="12" font-family="monospace" font-size="11" font-weight="bold" fill="white">}</text>
  <!-- Map pin in the center -->
  <circle cx="9" cy="5" r="2.5" stroke="white" stroke-width="1" fill="none"/>
  <circle cx="9" cy="5" r="1" fill="white"/>
  <line x1="9" y1="7.5" x2="9" y2="10" stroke="white" stroke-width="1" stroke-linecap="round"/>
</svg>
